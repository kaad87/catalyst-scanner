<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="description" content="Realtids-aktiekatalysatorer fra primærkilder — SEC 8-K, newswires, FDA og market movers.">
<title>Catalyst Tape — realtids-katalysatorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090d;
    --panel: rgba(255, 255, 255, .028);
    --panel-solid: #0d1118;
    --border: rgba(255, 255, 255, .07);
    --border-strong: rgba(255, 255, 255, .14);
    --text: #e6eaf0;
    --dim: #8a94a6;
    --faint: #5a6374;
    --ice: #7fb8ff;
    --aurora: #3ddfa4;
    --amber: #f5c97b;
    --red: #f87171;
    --tierA: #3ddfa4;
    --tierB: #7fb8ff;
    --radius: 14px;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html { scrollbar-color: #2a3140 transparent; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.55 "Inter", -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  /* aurora backdrop */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(900px 500px at 15% -10%, rgba(61, 223, 164, .075), transparent 60%),
      radial-gradient(1100px 600px at 85% -20%, rgba(127, 184, 255, .06), transparent 60%),
      radial-gradient(800px 800px at 50% 120%, rgba(127, 184, 255, .035), transparent 60%);
  }

  /* ---------- header ---------- */
  header {
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    background: rgba(7, 9, 13, .72);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1060px; margin: 0 auto; padding: 14px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px; position: relative; flex: none;
    background: linear-gradient(135deg, rgba(61,223,164,.25), rgba(127,184,255,.25));
    border: 1px solid var(--border-strong);
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: 0; margin: auto;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--aurora);
    box-shadow: 0 0 12px var(--aurora), 0 0 26px rgba(61,223,164,.5);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .45; } }
  .brand h1 { font-size: 16px; font-weight: 800; letter-spacing: .4px; }
  .brand h1 span { color: var(--dim); font-weight: 500; }
  .brand small { display: block; font-size: 11px; color: var(--faint); font-weight: 500; letter-spacing: .2px; }
  .header-status { font-size: 12px; color: var(--dim); display: flex; gap: 12px; align-items: baseline; }
  #scanstatus.ok { color: var(--aurora); }
  #scanstatus.bad { color: var(--red); }
  .header-actions { margin-left: auto; display: flex; gap: 10px; }
  #refresh {
    font: 600 13px "Inter", sans-serif; cursor: pointer;
    color: #06231a; background: linear-gradient(135deg, #4ee6b0, #35c690);
    border: none; border-radius: 10px; padding: 9px 18px;
    box-shadow: 0 2px 14px rgba(61, 223, 164, .25);
    transition: transform .15s, box-shadow .15s, opacity .15s;
  }
  #refresh:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(61, 223, 164, .38); }
  #refresh:disabled { opacity: .55; cursor: wait; transform: none; }

  /* ---------- layout ---------- */
  main { max-width: 1060px; margin: 0 auto; padding: 26px 24px 80px; }

  .kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 22px;
  }
  .kpi {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .kpi b { display: block; font: 700 22px/1.2 var(--mono); font-variant-numeric: tabular-nums; }
  .kpi b.green { color: var(--aurora); }
  .kpi b.blue { color: var(--ice); }
  .kpi span { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--faint); }

  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-bottom: 20px;
  }
  #filter {
    flex: 1 1 210px; max-width: 320px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 8px 13px;
    font: 500 13px "Inter", sans-serif; outline: none;
    transition: border-color .15s;
  }
  #filter::placeholder { color: var(--faint); }
  #filter:focus { border-color: rgba(127, 184, 255, .5); }
  .chip {
    font: 600 12px "Inter", sans-serif; cursor: pointer; user-select: none;
    color: var(--dim); background: var(--panel);
    border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.on { color: var(--text); background: rgba(127, 184, 255, .12); border-color: rgba(127, 184, 255, .45); }
  .chip.on.a { background: rgba(61, 223, 164, .12); border-color: rgba(61, 223, 164, .5); color: var(--aurora); }
  .chip.on.b { color: var(--ice); }
  .chip-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

  /* ---------- sections ---------- */
  .section-head {
    display: flex; align-items: baseline; gap: 10px;
    margin: 30px 0 12px;
  }
  .section-head h2 { font-size: 12px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; }
  .section-head.a h2 { color: var(--aurora); }
  .section-head.b h2 { color: var(--ice); }
  .section-head.c h2 { color: var(--faint); }
  .section-head .count { font: 700 11px var(--mono); color: var(--faint); }
  .section-head .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-strong), transparent); }

  /* ---------- cards ---------- */
  .hit {
    display: block; text-decoration: none; color: inherit; position: relative;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px 18px 13px 22px; margin: 10px 0;
    transition: transform .15s, border-color .15s, background .15s;
    overflow: hidden;
  }
  .hit::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--border-strong);
  }
  .hit.tA::before { background: linear-gradient(180deg, var(--aurora), rgba(61,223,164,.25)); }
  .hit.tB::before { background: linear-gradient(180deg, var(--ice), rgba(127,184,255,.2)); }
  .hit:hover { transform: translateY(-2px); border-color: var(--border-strong); background: rgba(255,255,255,.045); }
  .hit.hot { border-color: rgba(245, 201, 123, .4); }
  .hit.hot::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(400px 60px at 20% 0%, rgba(245, 201, 123, .09), transparent 70%);
  }
  .old { opacity: .72; }
  .stale { opacity: .45; }

  .row1 { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .ticker {
    font: 700 12px var(--mono); letter-spacing: .5px;
    color: var(--text); background: rgba(127, 184, 255, .12);
    border: 1px solid rgba(127, 184, 255, .25);
    border-radius: 6px; padding: 2px 8px;
  }
  .company { font-weight: 700; font-size: 14.5px; letter-spacing: .1px; }
  .src {
    font: 600 10px "Inter", sans-serif; letter-spacing: 1px; text-transform: uppercase;
    border-radius: 5px; padding: 2.5px 7px;
  }
  .src.sec { color: var(--ice); background: rgba(127, 184, 255, .1); }
  .src.wire { color: #b9a5ff; background: rgba(154, 123, 255, .12); }
  .src.fda { color: var(--aurora); background: rgba(61, 223, 164, .1); }
  .src.social { color: var(--amber); background: rgba(245, 201, 123, .12); }
  .fresh {
    font: 700 10px "Inter", sans-serif; letter-spacing: 1px;
    color: var(--amber); border: 1px solid rgba(245, 201, 123, .5);
    border-radius: 5px; padding: 2px 7px;
    animation: pulse 1.8s infinite;
  }
  .badges { margin-left: auto; display: flex; gap: 10px; align-items: center; font-variant-numeric: tabular-nums; }
  .mcap { font: 500 12px var(--mono); color: var(--dim); }
  .mcap .small-tag { color: var(--amber); }
  .chg { font: 700 12.5px var(--mono); }
  .chg.up { color: var(--aurora); }
  .chg.down { color: var(--red); }
  .age { font: 500 12px var(--mono); color: var(--faint); min-width: 34px; text-align: right; }

  .ai { display: flex; gap: 8px; align-items: baseline; margin-top: 9px; font-size: 13.5px; color: #d9dfe9; }
  .cat {
    flex: none; font: 700 10px "Inter", sans-serif; letter-spacing: .8px; text-transform: uppercase;
    border-radius: 5px; padding: 2.5px 7px;
  }
  .cat.good { color: var(--aurora); background: rgba(61, 223, 164, .12); }
  .cat.bad { color: var(--red); background: rgba(248, 113, 113, .12); }
  .cat.meh { color: var(--dim); background: rgba(255, 255, 255, .06); }
  .meta { margin-top: 7px; font-size: 12px; color: var(--faint); }
  .meta .caps { color: var(--aurora); opacity: .85; }

  details.noise > summary { list-style: none; cursor: pointer; }
  details.noise > summary::-webkit-details-marker { display: none; }
  details.noise > summary .section-head { margin-bottom: 0; }
  details.noise > summary .section-head h2::before { content: "▸ "; }
  details.noise[open] > summary .section-head h2::before { content: "▾ "; }

  #empty { color: var(--dim); padding: 70px 0; text-align: center; font-size: 14px; }
  #empty b { display: block; font-size: 17px; color: var(--text); margin-bottom: 6px; }

  footer {
    max-width: 1060px; margin: 0 auto; padding: 18px 24px 34px;
    border-top: 1px solid var(--border);
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: space-between;
    font-size: 11.5px; color: var(--faint);
  }

  @media (max-width: 700px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .badges { margin-left: 0; width: 100%; justify-content: flex-start; }
    .header-status { display: none; }
    main { padding: 18px 14px 60px; }
    .header-inner { padding: 12px 14px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <h1>Catalyst <span>Tape</span></h1>
        <small>Realtids-katalysatorer fra primærkilder</small>
      </div>
    </div>
    <div class="header-status">
      <span id="meta">indlæser…</span>
      <span id="scanstatus"></span>
    </div>
    <div class="header-actions">
      <button id="refresh" title="Kør en frisk scanning nu">Scan nu</button>
    </div>
  </div>
</header>

<main>
  <div class="kpis">
    <div class="kpi"><b id="kpiToday" class="green">–</b><span>Nye i dag</span></div>
    <div class="kpi"><b id="kpiA" class="green">–</b><span>A-signaler (48t)</span></div>
    <div class="kpi"><b id="kpiB" class="blue">–</b><span>B-signaler (48t)</span></div>
    <div class="kpi"><b id="kpiTotal">–</b><span>Hits på tapen</span></div>
  </div>

  <div class="toolbar">
    <input id="filter" placeholder="Søg ticker, selskab, keyword…">
    <span class="chip-sep"></span>
    <button class="chip a on" data-tier="A">Tier A</button>
    <button class="chip b on" data-tier="B">Tier B</button>
    <button class="chip" data-tier="C">Støj (C)</button>
    <span class="chip-sep"></span>
    <button class="chip" id="largecaps">Large caps</button>
  </div>

  <div id="tape"></div>
</main>

<footer>
  <span>SEC EDGAR 8-K · GlobeNewswire · PR Newswire · FDA · Truth Social</span>
  <span>Research, ikke investeringsrådgivning</span>
</footer>

<script>
const tape = document.getElementById("tape");
const meta = document.getElementById("meta");
const filterBox = document.getElementById("filter");
const scanStatus = document.getElementById("scanstatus");
const refreshBtn = document.getElementById("refresh");
const largeBtn = document.getElementById("largecaps");
const tierBtns = [...document.querySelectorAll(".chip[data-tier]")];
let hits = [];

/* ---------- prefs (persisted) ---------- */
const prefs = JSON.parse(localStorage.getItem("ct-prefs") || "{}");
const tiersOn = new Set(prefs.tiers || ["A", "B"]);
let showLarge = prefs.showLarge || false;
function savePrefs() {
  localStorage.setItem("ct-prefs", JSON.stringify({ tiers: [...tiersOn], showLarge }));
}
function syncChips() {
  tierBtns.forEach(b => b.classList.toggle("on", tiersOn.has(b.dataset.tier)));
  largeBtn.classList.toggle("on", showLarge);
}

/* ---------- helpers ---------- */
function ago(iso) {
  const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (mins < 1) return "nu";
  if (mins < 60) return mins + "m";
  if (mins < 1440) return Math.floor(mins / 60) + "t";
  return Math.floor(mins / 1440) + "d";
}
function heatClass(iso) {
  const mins = (Date.now() - new Date(iso)) / 60000;
  if (mins < 30) return "hot";
  if (mins < 180) return "";
  if (mins < 1440) return "old";
  return "stale";
}
function fmtCap(mc) {
  if (!mc) return "";
  return mc >= 1e9 ? "$" + (mc / 1e9).toFixed(1) + "B" : "$" + Math.round(mc / 1e6) + "M";
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
const CAT_LABEL = { partnership: "partnerskab", contract_award: "kontrakt",
  financing: "finansiering", dilution: "udvanding", merger: "M&A",
  policy: "politik", other: "andet" };
const CAT_CLS = { partnership: "good", contract_award: "good",
  financing: "bad", dilution: "bad", merger: "meh", policy: "meh", other: "meh" };
function srcClass(h) {
  if (h.social) return "social";
  if (h.source === "FDA") return "fda";
  return h.source.startsWith("SEC") ? "sec" : "wire";
}

/* ---------- rendering ---------- */
function hitCard(h) {
  const heat = heatClass(h.detected_at);
  const chg = h.price_change_pct;
  const chgHtml = (chg !== null && chg !== undefined && h.price_at_detect)
    ? `<span class="chg ${chg >= 0 ? "up" : "down"}">${chg >= 0 ? "+" : ""}${chg.toFixed(1)}%</span>` : "";
  const capHtml = h.market_cap
    ? `<span class="mcap">${fmtCap(h.market_cap)}${h.cap_bucket === "small" ? ' <span class="small-tag">small</span>' : ""}</span>` : "";
  const aiHtml = h.ai_summary
    ? `<div class="ai"><span class="cat ${CAT_CLS[h.ai_category] || "meh"}">${CAT_LABEL[h.ai_category] || esc(h.ai_category)}</span><span>${esc(h.ai_summary)}</span></div>` : "";
  const metaBits = [];
  if (h.company && h.title && !h.title.includes(h.company)) metaBits.push(esc(h.title));
  if (h.reason) metaBits.push(esc(h.reason));
  if (h.megacaps?.length) metaBits.push(`<span class="caps">⚡ ${esc(h.megacaps.join(", "))}</span>`);
  return `<a class="hit t${h.tier} ${heat}" href="${esc(h.url)}" target="_blank" rel="noopener">
    <div class="row1">
      ${heat === "hot" ? `<span class="fresh">NY</span>` : ""}
      ${h.ticker ? `<span class="ticker">${esc(h.ticker)}</span>` : ""}
      ${(h.ai_tickers || []).map(t => `<span class="ticker">${esc(t)}</span>`).join("")}
      <span class="company">${esc(h.company || h.title)}</span>
      <span class="src ${srcClass(h)}">${esc(h.source)}</span>
      <span class="badges">${capHtml}${chgHtml}<span class="age">${ago(h.detected_at)}</span></span>
    </div>
    ${aiHtml}
    ${metaBits.length ? `<div class="meta">${metaBits.join(" · ")}</div>` : ""}
  </a>`;
}

function section(cls, label, rows) {
  if (!rows.length) return "";
  const head = `<div class="section-head ${cls}"><h2>${label}</h2><span class="count">${rows.length}</span><span class="rule"></span></div>`;
  if (cls === "c")
    return `<details class="noise"><summary>${head}</summary>${rows.map(hitCard).join("")}</details>`;
  return head + rows.map(hitCard).join("");
}

function render() {
  const q = filterBox.value.trim().toLowerCase();
  let rows = hits.filter(h => !q ||
    JSON.stringify([h.ticker, h.company, h.title, h.keywords, h.megacaps, h.reason, h.ai_summary, h.ai_tickers])
      .toLowerCase().includes(q));
  if (!showLarge) rows = rows.filter(h => h.cap_bucket !== "large");
  rows = rows.filter(h => tiersOn.has(h.tier || "C"));

  const tier = t => rows.filter(h => (h.tier || "C") === t);
  const out = section("a", "Stærke signaler", tier("A"))
            + section("b", "Mulige signaler", tier("B"))
            + section("c", "Støj — finansiering, leasing m.m.", tier("C"));
  tape.innerHTML = out || `<div id="empty"><b>Ingen hits matcher</b>Justér filtre eller søgning — tapen fyldes automatisk, når scanneren finder nye katalysatorer.</div>`;
}

function updateKpis() {
  const now = Date.now();
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const fresh = h => now - new Date(h.detected_at) < 48 * 3600e3;
  document.getElementById("kpiToday").textContent = hits.filter(h => new Date(h.detected_at) >= today).length;
  document.getElementById("kpiA").textContent = hits.filter(h => h.tier === "A" && fresh(h)).length;
  document.getElementById("kpiB").textContent = hits.filter(h => h.tier === "B" && fresh(h)).length;
  document.getElementById("kpiTotal").textContent = hits.length;
}

/* ---------- data ---------- */
async function load() {
  try {
    const res = await fetch("data/hits.json?t=" + Date.now());
    hits = await res.json();
    hits.sort((a, b) => b.detected_at.localeCompare(a.detected_at));
    meta.textContent = "opdateret " + new Date().toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
    updateKpis();
    render();
  } catch {
    meta.textContent = "kunne ikke hente data";
  }
}

async function loadStatus() {
  try {
    const res = await fetch("/api/status");
    if (!res.ok) { scanStatus.textContent = ""; return; }
    const s = await res.json();
    if (s.status !== "completed") {
      scanStatus.textContent = "· scanner kører…"; scanStatus.className = "ok";
    } else if (s.conclusion !== "success") {
      scanStatus.textContent = "· seneste scan fejlede"; scanStatus.className = "bad";
    } else {
      scanStatus.textContent = "· sidste scan for " + ago(s.last_run) + " siden"; scanStatus.className = "";
    }
  } catch { scanStatus.textContent = ""; }
}

/* ---------- interactions ---------- */
tierBtns.forEach(b => b.addEventListener("click", () => {
  const t = b.dataset.tier;
  tiersOn.has(t) ? tiersOn.delete(t) : tiersOn.add(t);
  savePrefs(); syncChips(); render();
}));
largeBtn.addEventListener("click", () => {
  showLarge = !showLarge;
  savePrefs(); syncChips(); render();
});
filterBox.addEventListener("input", render);

refreshBtn.addEventListener("click", async () => {
  refreshBtn.disabled = true;
  refreshBtn.textContent = "Starter…";
  try {
    const res = await fetch("/api/scan", { method: "POST" });
    const body = await res.json().catch(() => ({}));
    if (res.status === 202) {
      const newestBefore = hits[0]?.detected_at || "";
      refreshBtn.textContent = body.status === "already_running" ? "Scanner kører…" : "Scanner… (~2 min)";
      const t0 = Date.now();
      const poll = setInterval(async () => {
        await load(); loadStatus();
        const done = (hits[0]?.detected_at || "") !== newestBefore;
        if (done || Date.now() - t0 > 5 * 60000) {
          clearInterval(poll);
          refreshBtn.textContent = done ? "Opdateret ✓" : "Ingen nye hits";
          setTimeout(() => { refreshBtn.textContent = "Scan nu"; refreshBtn.disabled = false; }, 4000);
        }
      }, 20000);
    } else {
      refreshBtn.textContent = "Fejl: " + (body.error || res.status);
      setTimeout(() => { refreshBtn.textContent = "Scan nu"; refreshBtn.disabled = false; }, 6000);
    }
  } catch {
    refreshBtn.textContent = "Netværksfejl";
    setTimeout(() => { refreshBtn.textContent = "Scan nu"; refreshBtn.disabled = false; }, 6000);
  }
});

syncChips();
load();
loadStatus();
setInterval(load, 60000);
setInterval(loadStatus, 60000);
setInterval(render, 30000); // heat/age ticks over without refetch
</script>
</body>
</html>
