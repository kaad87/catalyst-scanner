<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Catalyst Tape</title>
<style>
  :root {
    --bg: #0b0e13;
    --panel: #11151d;
    --border: #1e2430;
    --text: #c8d0dc;
    --dim: #5c6675;
    --hot: #ffd21f;
    --warm: #d4b344;
    --sec: #4da3ff;
    --wire: #9a7bff;
    --up: #3ddc84;
    --down: #ff5d5d;
    --tierA: #3ddc84;
    --tierB: #4da3ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 "SF Mono", ui-monospace, Menlo, Consolas, monospace;
  }
  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 16px 22px 10px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 2;
  }
  h1 { font-size: 17px; margin: 0; letter-spacing: 2px; color: #fff; }
  h1 .blink { color: var(--hot); animation: pulse 1.6s infinite; }
  @keyframes pulse { 50% { opacity: .25; } }
  #meta { color: var(--dim); font-size: 12px; }
  .controls { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  label.toggle { color: var(--dim); font-size: 12px; cursor: pointer; user-select: none; }
  #filter {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 5px 10px; border-radius: 4px; font: inherit;
    font-size: 12px; width: 190px;
  }
  #filter:focus { outline: 1px solid var(--sec); }
  main { padding: 10px 22px 60px; max-width: 1100px; margin: 0 auto; }
  h2.tier {
    font-size: 12px; letter-spacing: 2px; margin: 26px 0 6px;
    padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }
  h2.tier.a { color: var(--tierA); }
  h2.tier.b { color: var(--tierB); }
  details.noise > summary {
    font-size: 12px; letter-spacing: 2px; color: var(--dim);
    margin: 26px 0 6px; padding-bottom: 4px; cursor: pointer;
    border-bottom: 1px solid var(--border); list-style: none;
  }
  details.noise > summary::before { content: "▸ "; }
  details.noise[open] > summary::before { content: "▾ "; }
  .hit {
    display: block; text-decoration: none; color: inherit;
    background: var(--panel); border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 6px; padding: 10px 14px; margin: 8px 0;
    transition: border-color .2s;
  }
  .hit:hover { border-color: var(--sec); }
  .hit.tA { border-left-color: var(--tierA); }
  .hit.tB { border-left-color: var(--tierB); }
  .hit.hot {
    box-shadow: 0 0 14px rgba(255, 210, 31, .22), inset 0 0 30px rgba(255, 210, 31, .04);
  }
  .hit.hot .age { color: var(--hot); font-weight: 700; }
  .hit.warm .age { color: var(--warm); }
  .row1 { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .age { color: var(--dim); font-size: 12px; min-width: 46px; }
  .ticker {
    background: #1a2233; color: #dfe8ff; border-radius: 4px;
    padding: 1px 7px; font-weight: 700; font-size: 12.5px;
  }
  .src { font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase;
         padding: 1px 6px; border-radius: 3px; }
  .src.sec  { color: var(--sec);  border: 1px solid var(--sec); }
  .src.wire { color: var(--wire); border: 1px solid var(--wire); }
  .src.social { color: var(--hot); border: 1px solid var(--hot); }
  .src.fda  { color: var(--up); border: 1px solid var(--up); }
  #refresh {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 5px 12px; border-radius: 4px;
    font: inherit; font-size: 12px; cursor: pointer;
  }
  #refresh:hover { border-color: var(--hot); color: var(--hot); }
  #refresh:disabled { opacity: .5; cursor: wait; }
  .title { font-weight: 600; color: #e8edf5; }
  .badges { margin-left: auto; display: flex; gap: 8px; align-items: baseline; }
  .mcap { color: var(--dim); font-size: 12px; }
  .mcap.small { color: var(--hot); }
  .chg { font-size: 12.5px; font-weight: 700; }
  .chg.up { color: var(--up); }
  .chg.down { color: var(--down); }
  .score { color: var(--dim); font-size: 11px; }
  .ai {
    color: #dfe8f5; font-size: 13px; margin-top: 5px;
    padding-left: 10px; border-left: 2px solid var(--border);
  }
  .cat { font-size: 10.5px; padding: 1px 6px; border-radius: 3px; margin-right: 6px;
         text-transform: uppercase; letter-spacing: 1px; }
  .cat.good { color: var(--up); border: 1px solid var(--up); }
  .cat.bad  { color: var(--down); border: 1px solid var(--down); }
  .cat.meh  { color: var(--dim); border: 1px solid var(--dim); }
  .reason { color: var(--dim); font-size: 12px; margin-top: 3px; }
  .caps { color: var(--up); font-size: 12px; margin-top: 2px; }
  .old { opacity: .6; }
  .stale { opacity: .35; }
  #empty { color: var(--dim); padding: 40px 0; text-align: center; }
  footer {
    color: var(--dim); font-size: 11px; text-align: center;
    padding: 14px; border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
<header>
  <h1><span class="blink">●</span> CATALYST TAPE</h1>
  <span id="meta">loading…</span>
  <div class="controls">
    <label class="toggle"><input type="checkbox" id="hideLarge" checked> skjul large caps</label>
    <input id="filter" placeholder="filter: ticker, keyword…">
    <button id="refresh" title="Kør en frisk scanning nu">⟳ Scan nu</button>
  </div>
</header>
<main id="main"></main>
<footer>SEC EDGAR 8-K + newswire RSS · A = stærkt signal, B = muligt, C = støj (finansiering m.m.) · auto-refresh 60s · research, ikke investeringsrådgivning</footer>
<script>
const main = document.getElementById("main");
const meta = document.getElementById("meta");
const filterBox = document.getElementById("filter");
const hideLarge = document.getElementById("hideLarge");
let hits = [];

function ago(iso) {
  const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (mins < 1) return "now";
  if (mins < 60) return mins + "m";
  if (mins < 1440) return Math.floor(mins / 60) + "h";
  return Math.floor(mins / 1440) + "d";
}

function heatClass(iso) {
  const mins = (Date.now() - new Date(iso)) / 60000;
  if (mins < 30) return "hot";
  if (mins < 180) return "warm";
  if (mins < 1440) return "old";
  return "stale";
}

function fmtCap(mc) {
  if (!mc) return "";
  if (mc >= 1e9) return "$" + (mc / 1e9).toFixed(1) + "B";
  return "$" + Math.round(mc / 1e6) + "M";
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

const CAT_LABEL = { partnership: "partnerskab", contract_award: "kontrakt",
  financing: "finansiering", dilution: "udvanding", merger: "M&A",
  policy: "politik", other: "andet" };
const CAT_CLS = { partnership: "good", contract_award: "good",
  financing: "bad", dilution: "bad", merger: "meh", policy: "meh", other: "meh" };

function srcClass(h) {
  if (h.social) return "social";
  if (h.source === "FDA") return "fda";
  return h.source.startsWith("SEC") ? "sec" : "wire";
}

function hitCard(h) {
  const heat = heatClass(h.detected_at);
  const srcCls = srcClass(h);
  const chg = h.price_change_pct;
  const chgHtml = (chg !== null && chg !== undefined && h.price_at_detect)
    ? `<span class="chg ${chg >= 0 ? "up" : "down"}">${chg >= 0 ? "+" : ""}${chg.toFixed(1)}% siden detekt</span>` : "";
  const capHtml = h.market_cap
    ? `<span class="mcap ${h.cap_bucket || ""}">${fmtCap(h.market_cap)}${h.cap_bucket === "small" ? " · small cap" : ""}</span>` : "";
  const aiHtml = h.ai_summary
    ? `<div class="ai"><span class="cat ${CAT_CLS[h.ai_category] || "meh"}">${CAT_LABEL[h.ai_category] || h.ai_category}</span>${esc(h.ai_summary)}</div>` : "";
  return `<a class="hit t${h.tier} ${heat}" href="${esc(h.url)}" target="_blank" rel="noopener">
    <div class="row1">
      <span class="age">${ago(h.detected_at)}</span>
      ${h.ticker ? `<span class="ticker">${esc(h.ticker)}</span>` : ""}
      ${(h.ai_tickers || []).map(t => `<span class="ticker">${esc(t)}</span>`).join("")}
      <span class="src ${srcCls}">${esc(h.source)}</span>
      <span class="title">${esc(h.company || h.title)}</span>
      <span class="badges">${capHtml}${chgHtml}<span class="score">score ${h.score ?? 0}</span></span>
    </div>
    ${aiHtml}
    ${h.company && h.title && !h.title.includes(h.company) ? `<div class="reason">${esc(h.title)}</div>` : ""}
    <div class="reason">${esc(h.reason)}</div>
    ${h.megacaps?.length ? `<div class="caps">⚡ nævner: ${esc(h.megacaps.join(", "))}</div>` : ""}
  </a>`;
}

function render() {
  const q = filterBox.value.trim().toLowerCase();
  let rows = hits.filter(h => !q ||
    JSON.stringify([h.ticker, h.company, h.title, h.keywords, h.megacaps, h.reason, h.ai_summary])
      .toLowerCase().includes(q));
  if (hideLarge.checked)
    rows = rows.filter(h => h.cap_bucket !== "large");

  if (!rows.length) {
    main.innerHTML = '<div id="empty">ingen hits' + (q ? " der matcher “" + esc(q) + "”" : " endnu — tapen fyldes når scanneren kører") + "</div>";
    return;
  }
  const tier = t => rows.filter(h => (h.tier || "C") === t);
  const A = tier("A"), B = tier("B"), C = tier("C");
  let out = "";
  if (A.length) out += `<h2 class="tier a">TIER A — STÆRKE SIGNALER (${A.length})</h2>` + A.map(hitCard).join("");
  if (B.length) out += `<h2 class="tier b">TIER B — MULIGE (${B.length})</h2>` + B.map(hitCard).join("");
  if (C.length) out += `<details class="noise"><summary>TIER C — STØJ: FINANSIERING, LEASING M.M. (${C.length})</summary>` + C.map(hitCard).join("") + "</details>";
  main.innerHTML = out;
}

async function load() {
  try {
    const res = await fetch("data/hits.json?t=" + Date.now());
    hits = await res.json();
    hits.sort((a, b) => b.detected_at.localeCompare(a.detected_at));
    meta.textContent = hits.length + " hits · opdateret " + new Date().toLocaleTimeString("da-DK");
    render();
  } catch {
    meta.textContent = "kunne ikke hente data/hits.json";
  }
}

const refreshBtn = document.getElementById("refresh");
refreshBtn.addEventListener("click", async () => {
  refreshBtn.disabled = true;
  refreshBtn.textContent = "⟳ starter…";
  try {
    const res = await fetch("/api/scan", { method: "POST" });
    const body = await res.json().catch(() => ({}));
    if (res.status === 202) {
      const newestBefore = hits[0]?.detected_at || "";
      refreshBtn.textContent = body.status === "already_running"
        ? "⟳ scanner kører allerede…" : "⟳ scanner… (~2 min)";
      // poll for the Actions commit -> Netlify deploy to land
      const t0 = Date.now();
      const poll = setInterval(async () => {
        await load();
        const done = (hits[0]?.detected_at || "") !== newestBefore;
        if (done || Date.now() - t0 > 5 * 60000) {
          clearInterval(poll);
          refreshBtn.textContent = done ? "⟳ opdateret!" : "⟳ ingen nye hits";
          setTimeout(() => { refreshBtn.textContent = "⟳ Scan nu"; refreshBtn.disabled = false; }, 4000);
        }
      }, 20000);
    } else {
      refreshBtn.textContent = "⟳ fejl: " + (body.error || res.status);
      setTimeout(() => { refreshBtn.textContent = "⟳ Scan nu"; refreshBtn.disabled = false; }, 6000);
    }
  } catch {
    refreshBtn.textContent = "⟳ netværksfejl";
    setTimeout(() => { refreshBtn.textContent = "⟳ Scan nu"; refreshBtn.disabled = false; }, 6000);
  }
});

filterBox.addEventListener("input", render);
hideLarge.addEventListener("change", render);
load();
setInterval(load, 60000);
setInterval(render, 30000); // ages/heat tick over without refetch
</script>
</body>
</html>
